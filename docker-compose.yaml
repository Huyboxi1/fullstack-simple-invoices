version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: simple-invoice-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=postgres
      - POSTGRES_HOST=postgres
      - DB_PORT=5432
      - POSTGRES_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=password
      - DB_DATABASE=simple_invoice
      - PORT=3000
      - POSTGRES_DB=simple_invoice

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: simple-invoice-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  postgres:
    image: postgres:15-alpine
    container_name: simple-invoice-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=simple_invoice
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d simple_invoice"]
      interval: 5s
      timeout: 5s
      retries: 5
